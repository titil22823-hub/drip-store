<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>666 STORE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

:root{
  --bg:    #000;
  --s1:    #0a0a0a;
  --s2:    #111;
  --s3:    #1a1a1a;
  --s4:    #2a2a2a;
  --s5:    #3a3a3a;
  --mid:   #666;
  --sub:   #999;
  --text:  #e8e8e8;
  --white: #fff;
  --gold:  #f0c030;
  --gold2: #a07a10;
  --r:     4px;
}

html,body{
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  min-height:100vh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

/* ──────────── COUNTRY SCREEN ──────────── */
#cs{
  position:fixed;inset:0;z-index:900;
  background:var(--bg);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:40px 24px;
  gap:0;
}
#cs.exit{animation:csOut .3s ease forwards;pointer-events:none}
@keyframes csOut{to{opacity:0;transform:translateY(-16px)}}

.cs-mark{
  font-size:13px;font-weight:500;
  letter-spacing:6px;color:var(--s5);
  text-transform:uppercase;
  margin-bottom:20px;
  animation:up .5s ease .05s both;
}
.cs-logo{
  font-size:52px;font-weight:700;
  letter-spacing:-2px;color:var(--white);
  line-height:1;margin-bottom:6px;
  animation:up .5s ease .1s both;
}
.cs-tagline{
  font-size:12px;font-weight:400;
  letter-spacing:2px;color:var(--mid);
  margin-bottom:56px;
  animation:up .5s ease .15s both;
}
.cs-label{
  font-size:11px;font-weight:500;
  letter-spacing:1px;color:var(--s5);
  margin-bottom:12px;
  animation:up .5s ease .2s both;
}

.cs-list{width:100%;max-width:320px;display:flex;flex-direction:column;gap:6px}

.cs-row{
  width:100%;padding:15px 16px;
  background:var(--s1);
  border:1px solid var(--s3);
  border-radius:var(--r);
  color:var(--text);
  font-family:'Inter',sans-serif;
  cursor:pointer;
  display:flex;align-items:center;gap:12px;
  transition:background .12s,border-color .12s,transform .1s;
  animation:up .5s ease both;
}
.cs-row:nth-child(1){animation-delay:.25s}
.cs-row:nth-child(2){animation-delay:.3s}
.cs-row:nth-child(3){animation-delay:.35s}
.cs-row:active{transform:scale(.98);background:var(--s2);border-color:var(--s4)}
.cs-row.star-row{border-color:rgba(240,192,48,.2);background:rgba(240,192,48,.03)}
.cs-row.star-row:active{background:rgba(240,192,48,.07)}

.cs-flag{font-size:22px;flex-shrink:0}
.cs-info{flex:1;text-align:left}
.cs-name{font-size:14px;font-weight:600;letter-spacing:-.1px}
.cs-name.gld{color:var(--gold)}
.cs-sub2{font-size:11px;font-weight:400;color:var(--mid);margin-top:1px}
.cs-arr{color:var(--s5);font-size:16px;font-weight:300}
.cs-arr.gld{color:var(--gold2)}

/* ──────────── APP ──────────── */
#app{display:none;position:relative;z-index:1}
#app.on{display:block;animation:fadeIn .3s ease}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes cardIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ── HEADER ── */
header{
  position:sticky;top:0;z-index:100;
  height:50px;padding:0 16px;
  background:rgba(0,0,0,.9);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid var(--s3);
  display:flex;align-items:center;justify-content:space-between;
}
.logo{
  font-size:17px;font-weight:700;
  letter-spacing:-.3px;color:var(--white);
}
.logo span{color:var(--s5);font-weight:400}
.hdr-r{display:flex;align-items:center;gap:7px}
.hdr-pill{
  height:30px;padding:0 10px;
  background:var(--s2);border:1px solid var(--s4);
  border-radius:100px;
  display:flex;align-items:center;gap:5px;
  font-size:12px;font-weight:600;letter-spacing:.2px;
  color:var(--sub);cursor:pointer;
  transition:all .12s;
}
.hdr-pill:active{transform:scale(.93)}
.hdr-pill.gld{border-color:rgba(240,192,48,.35);color:var(--gold)}
.hdr-ico{
  width:32px;height:32px;
  background:var(--s2);border:1px solid var(--s4);
  border-radius:100px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .12s;
}
.hdr-ico:active{transform:scale(.9);background:var(--s3)}

/* ── HERO ── */
.hero{
  padding:40px 16px 32px;
  border-bottom:1px solid var(--s3);
}
.hero-label{
  font-size:11px;font-weight:500;
  letter-spacing:2px;color:var(--mid);
  text-transform:uppercase;
  margin-bottom:16px;
}
.hero-h1{
  font-size:clamp(38px,10vw,52px);
  font-weight:700;letter-spacing:-1.5px;
  line-height:1.05;color:var(--white);
}
.hero-h1 span{color:var(--s5)}
.hero-p{
  margin-top:14px;
  font-size:13px;font-weight:400;
  color:var(--mid);line-height:1.7;
  max-width:260px;letter-spacing:-.1px;
}

/* ── FILTERS ── */
.filters{
  display:flex;gap:0;
  border-bottom:1px solid var(--s3);
  padding:0 16px;
  overflow-x:auto;scrollbar-width:none;
}
.filters::-webkit-scrollbar{display:none}
.f-btn{
  flex-shrink:0;padding:12px 14px;
  background:transparent;border:none;
  border-bottom:1.5px solid transparent;
  color:var(--mid);
  font-family:'Inter',sans-serif;
  font-size:12px;font-weight:500;
  letter-spacing:.2px;
  cursor:pointer;transition:all .12s;
  white-space:nowrap;margin-bottom:-1px;
}
.f-btn.on{color:var(--white);border-bottom-color:var(--white)}
.f-btn:active{opacity:.6}

/* ── SEC HEAD ── */
.sec-h{
  padding:14px 16px 10px;
  display:flex;align-items:center;justify-content:space-between;
}
.sec-t{font-size:11px;font-weight:600;letter-spacing:1.5px;color:var(--mid);text-transform:uppercase}
.sec-n{font-size:11px;font-weight:400;color:var(--s5)}

/* ── GRID ── */
.grid{
  padding:0 10px 48px;
  display:grid;grid-template-columns:1fr 1fr;
  gap:8px;
}

/* ── CARD ── */
.card{
  background:var(--s1);
  border:1px solid var(--s3);
  border-radius:8px;
  cursor:pointer;overflow:hidden;
  transition:border-color .15s,transform .12s;
  animation:cardIn .4s ease both;
}
.card:active{transform:scale(.97);border-color:var(--s4)}
.card.wide{grid-column:span 2;display:grid;grid-template-columns:1fr 1fr}

.cbadge{
  position:absolute;top:8px;left:8px;
  padding:3px 8px;border-radius:100px;z-index:3;
  font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
}
.bn{background:rgba(255,255,255,.9);color:#000}
.bh{background:rgba(255,255,255,.9);color:#000}
.bs{background:var(--gold);color:#000}

.cimg{
  aspect-ratio:1;background:var(--s2);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;position:relative;
}
.card.wide .cimg{aspect-ratio:auto;min-height:180px}
.cimg img{
  width:100%;height:100%;object-fit:cover;
  filter:grayscale(100%);display:block;
  transition:filter .25s,transform .28s;
}
.card:active .cimg img{filter:grayscale(60%);transform:scale(1.03)}
.c-em{font-size:44px;filter:grayscale(1);opacity:.55}

.cbody{padding:12px}
.card.wide .cbody{padding:16px;display:flex;flex-direction:column;justify-content:center;gap:0}

.c-tag{font-size:10px;font-weight:500;letter-spacing:.5px;color:var(--s5);margin-bottom:4px;text-transform:uppercase}
.c-name{
  font-size:15px;font-weight:600;
  letter-spacing:-.3px;line-height:1.2;
  color:var(--white);margin-bottom:4px;
}
.card.wide .c-name{font-size:18px}
.c-desc{
  font-size:11px;font-weight:400;
  color:var(--mid);line-height:1.6;
  margin-bottom:12px;letter-spacing:-.1px;
}
.c-foot{display:flex;align-items:flex-end;justify-content:space-between;gap:6px}
.c-pblock{}
.c-old{font-size:10px;color:var(--s5);text-decoration:line-through;display:block;margin-bottom:1px}
.c-price{font-size:18px;font-weight:700;letter-spacing:-.4px;color:var(--white);line-height:1}
.c-stars{
  display:flex;align-items:center;gap:3px;
  font-size:18px;font-weight:700;
  letter-spacing:-.4px;color:var(--gold);line-height:1;
}
.c-sico{font-size:13px}
.c-buy{
  height:32px;padding:0 13px;
  background:var(--s3);border:1px solid var(--s4);
  border-radius:6px;
  color:var(--text);
  font-family:'Inter',sans-serif;
  font-size:11px;font-weight:600;
  letter-spacing:.2px;
  cursor:pointer;transition:all .12s;white-space:nowrap;flex-shrink:0;
}
.c-buy:active{background:var(--white);color:#000;border-color:var(--white);transform:scale(.93)}

/* ── MODAL ── */
.mo{
  position:fixed;inset:0;background:rgba(0,0,0,.8);
  z-index:500;display:none;align-items:flex-end;
}
.mo.open{display:flex;animation:fadeIn .15s ease}
.mo-sh{
  width:100%;background:#0c0c0c;
  border-top:1px solid var(--s4);
  border-radius:16px 16px 0 0;
  padding:16px 16px calc(24px + env(safe-area-inset-bottom));
  transform:translateY(100%);
  transition:transform .3s cubic-bezier(.2,1,.5,1);
  max-height:90vh;overflow-y:auto;
}
.mo.open .mo-sh{transform:translateY(0)}
.mo-bar{width:32px;height:3px;background:var(--s4);border-radius:2px;margin:0 auto 18px}

.mo-img{
  width:100%;aspect-ratio:16/10;background:var(--s2);
  border-radius:8px;overflow:hidden;margin-bottom:16px;
  display:flex;align-items:center;justify-content:center;
  font-size:72px;position:relative;
}
.mo-img img{width:100%;height:100%;object-fit:cover;filter:grayscale(100%)}
.mo-img-tag{
  position:absolute;top:10px;right:10px;
  font-size:9px;font-weight:600;letter-spacing:2px;
  color:var(--mid);text-transform:uppercase;
  background:rgba(0,0,0,.55);padding:3px 8px;border-radius:4px;
}

.mo-cat{font-size:10px;font-weight:500;letter-spacing:1.5px;color:var(--mid);text-transform:uppercase;margin-bottom:5px}
.mo-name{font-size:24px;font-weight:700;letter-spacing:-.6px;color:var(--white);margin-bottom:8px;line-height:1.1}
.mo-desc{font-size:12px;font-weight:400;color:var(--mid);line-height:1.7;margin-bottom:16px;letter-spacing:-.1px}
.mo-sep{height:1px;background:var(--s3);margin-bottom:16px}

.mo-pr-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:6px}
.mo-price{font-size:28px;font-weight:700;letter-spacing:-.8px;color:var(--white);line-height:1}
.mo-price-old{font-size:12px;color:var(--mid);text-decoration:line-through;display:block;margin-bottom:2px}
.mo-stars-pill{
  display:flex;align-items:center;gap:5px;
  font-size:15px;font-weight:700;color:var(--gold);
  padding:6px 12px;border-radius:6px;
  background:rgba(240,192,48,.07);border:1px solid rgba(240,192,48,.18);
  letter-spacing:-.2px;
}
.mo-stars-pill small{font-size:9px;color:var(--gold2);font-weight:600;letter-spacing:1px}

.mo-hint{
  font-size:11px;font-weight:400;color:var(--mid);
  line-height:1.6;margin-bottom:18px;letter-spacing:-.1px;
  padding:10px 12px;background:var(--s2);border-radius:6px;
  border-left:2px solid var(--s4);
}
.mo-cta{
  width:100%;padding:15px;
  background:var(--white);border:none;border-radius:8px;
  color:#000;
  font-family:'Inter',sans-serif;
  font-size:14px;font-weight:600;letter-spacing:-.1px;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:opacity .12s,transform .12s;
}
.mo-cta:active{opacity:.8;transform:scale(.98)}

.card:nth-child(1){animation-delay:.04s}.card:nth-child(2){animation-delay:.08s}
.card:nth-child(3){animation-delay:.12s}.card:nth-child(4){animation-delay:.16s}
.card:nth-child(5){animation-delay:.2s} .card:nth-child(6){animation-delay:.24s}
.card:nth-child(7){animation-delay:.28s}.card:nth-child(8){animation-delay:.32s}
.card:nth-child(9){animation-delay:.36s}
</style>
</head>

    <div class="sec-t">Каталог</div>
    <div class="sec-n" id="cnt"></div>

</div>

<!-- MODAL -->
<div class="mo" id="mo" onclick="closeMo(event)">

</div>

const CM={
  ua:   {flag:'🇺🇦',sym:'₴',isS:false},
  eu:   {flag:'🇪🇺',sym:'€',isS:false},
  stars:{flag:'⭐', sym:'⭐',isS:true},
};

let country=null,curIdx=null,curList=products;

function selectCountry(c){
  country=c;
  try{localStorage.setItem('_666c',c)}catch(e){}
  document.getElementById('hdr-flag').textContent=CM[c].flag;
  document.getElementById('hdr-sym').textContent=CM[c].sym;
  const pill=document.getElementById('hdr-pill');
  CM[c].isS?pill.classList.add('gld'):pill.classList.remove('gld');
  const cs=document.getElementById('cs');
  cs.classList.add('exit');
  setTimeout(()=>cs.style.display='none',320);
  document.getElementById('app').classList.add('on');
  renderGrid(curList);
}

function changeCountry(){
  country=null;
  const cs=document.getElementById('cs');
  cs.style.display='';cs.classList.remove('exit');
  document.getElementById('app').classList.remove('on');
}

function renderGrid(list){
  const g=document.getElementById('grid');
  g.innerHTML='';
  const n=list.length;
  document.getElementById('cnt').textContent=n+' '+(n===1?'товар':n<5?'товара':'товаров');
  list.forEach((p,i)=>{
    const pr=p.prices[country];
    const isS=CM[country].isS;
    const card=document.createElement('div');
    card.className='card'+(p.wide?' wide':'');
    card.style.animationDelay=(0.04+i*0.04)+'s';
    card.onclick=()=>openMo(p.id);

    const bmap={new:'NEW',hot:'HIT',sale:'SALE'};
    const bH=p.badge?`<span class="cbadge b${p.badge[0]}">${bmap[p.badge]}</span>`:'';
    const imgH=p.photo?`<img src="${p.photo}" alt="${p.name}" loading="lazy">`:`<span class="c-em">${p.emoji}</span>`;
    const oldH=pr.old?`<span class="c-old">${pr.old}${pr.sym}</span>`:'';

    const prH=isS
      ?`<div class="c-stars"><span class="c-sico">⭐</span>${pr.now}</div>`
      :`<div class="c-price">${oldH}${pr.now}${pr.sym}</div>`;

    card.innerHTML=`
      ${bH}
      <div class="cimg">${imgH}</div>
      <div class="cbody">
        <div class="c-tag">${p.cat}</div>
        <div class="c-name">${p.name}</div>
        <div class="c-desc">${p.desc}</div>
        <div class="c-foot">
          <div class="c-pblock">${prH}</div>
          <button class="c-buy" onclick="event.stopPropagation();openMo(${p.id})">Купить</button>
        </div>
      </div>`;
    g.appendChild(card);
  });
}

function openMo(id){
  const p=products.find(x=>x.id===id);
  if(!p)return;
  curIdx=id;
  const pr=p.prices[country];
  const isS=CM[country].isS;

  const imgBox=document.getElementById('m-img');
  imgBox.innerHTML=p.photo
    ?`<img src="${p.photo}" alt="${p.name}"><div class="mo-img-tag">666 STORE</div>`
    :`<span style="font-size:72px;filter:grayscale(1);opacity:.5">${p.emoji}</span><div class="mo-img-tag">666 STORE</div>`;

  document.getElementById('m-cat').textContent=p.cat;
  document.getElementById('m-name').textContent=p.name;
  document.getElementById('m-desc').textContent=p.desc;

  const row=document.getElementById('m-pr');
  const sp=p.prices.stars;
  if(isS){
    const oH=pr.old?`<span class="mo-price-old">${pr.old}${pr.sym}</span>`:'';
    row.innerHTML=`<div>${oH}<div class="mo-stars-pill">⭐ ${pr.now} <small>STARS</small></div></div>`;
  } else {
    const oH=pr.old?`<span class="mo-price-old">${pr.old}${pr.sym}</span>`:'';
    row.innerHTML=`
      <div>${oH}<div class="mo-price">${pr.now}${pr.sym}</div></div>
      <div class="mo-stars-pill">⭐ ${sp.now} <small>STARS</small></div>`;
  }

  document.getElementById('mo').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeMo(e){
  if(e.target===document.getElementById('mo')){
    document.getElementById('mo').classList.remove('open');
    document.body.style.overflow='';
  }
}

document.getElementById('m-cta').onclick=()=>{
  const p=products.find(x=>x.id===curIdx);
  if(!p)return;
  const pr=p.prices[country];
  const isS=CM[country].isS;
  const prStr=isS?`⭐ ${pr.now} звёзд`:`${pr.now}${pr.sym}`;
  const msg=encodeURIComponent(`Хочу заказать: ${p.name}\nЦена: ${prStr}`);
  const url=`https://t.me/${OWNER}?text=${msg}`;
  if(window.Telegram?.WebApp)window.Telegram.WebApp.openTelegramLink(url);
  else window.open(url,'_blank');
};

function openContact(){
  const url=`https://t.me/${OWNER}`;
  if(window.Telegram?.WebApp)window.Telegram.WebApp.openTelegramLink(url);
  else window.open(url,'_blank');
}

function filter(cat,btn){
  document.querySelectorAll('.f-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  curList=cat==='all'?products:products.filter(p=>p.type===cat);
  renderGrid(curList);
}

(function(){
  if(window.Telegram?.WebApp){window.Telegram.WebApp.ready();window.Telegram.WebApp.expand()}
  let s=null;try{s=localStorage.getItem('_666c')}catch(e){}
  if(s&&CM[s])selectCountry(s);
})();
</script>
</body>
</html>
