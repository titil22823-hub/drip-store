<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DRIP STORE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --accent: #ff3c3c;
    --accent2: #ff8c00;
    --text: #f0f0f0;
    --muted: #666;
    --border: #222;
    --card-bg: #131313;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: 0.4;
  }

  #country-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 500;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    animation: fadeIn 0.3s ease;
  }

  #country-screen.hiding {
    animation: zoomOut 0.35s cubic-bezier(0.55, 0, 1, 0.45) forwards;
    pointer-events: none;
  }

  @keyframes zoomOut {
    to { opacity: 0; transform: scale(0.94); }
  }

  .country-glow {
    position: absolute;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,60,60,0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  .cs-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 44px;
    letter-spacing: 4px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 4px;
    animation: fadeInDown 0.5s ease 0.1s both;
  }

  .cs-sub {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 44px;
    animation: fadeInDown 0.5s ease 0.15s both;
  }

  .cs-q {
    font-size: 19px;
    font-weight: 700;
    text-align: center;
    margin-bottom: 6px;
    animation: fadeInUp 0.5s ease 0.2s both;
  }

  .cs-hint {
    font-size: 13px;
    color: var(--muted);
    text-align: center;
    margin-bottom: 30px;
    animation: fadeInUp 0.5s ease 0.25s both;
  }

  .cs-list {
    width: 100%;
    max-width: 320px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .cs-btn {
    width: 100%;
    padding: 16px 18px;
    border-radius: 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: border-color 0.15s, transform 0.15s;
    animation: fadeInUp 0.5s ease both;
  }

  .cs-btn:nth-child(1) { animation-delay: 0.3s; }
  .cs-btn:nth-child(2) { animation-delay: 0.37s; }
  .cs-btn:nth-child(3) { animation-delay: 0.44s; }

  .cs-btn:active { transform: scale(0.97); border-color: var(--accent); }

  .cs-flag { font-size: 30px; flex-shrink: 0; }

  .cs-info { text-align: left; }
  .cs-country-name { font-size: 15px; font-weight: 700; }
  .cs-currency-hint { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .cs-arrow { margin-left: auto; color: var(--muted); font-size: 20px; font-weight: 300; }

  #app { display: none; }
  #app.visible { display: block; animation: fadeIn 0.4s ease; }

  header {
    position: sticky;
    top: 0;
    z-index: 50;
    padding: 13px 18px;
    background: rgba(10,10,10,0.93);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 29px;
    letter-spacing: 3px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }

  .logo-sub {
    font-size: 9px;
    letter-spacing: 4px;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 2px;
  }

  .header-right { display: flex; align-items: center; gap: 8px; }

  .country-chip {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 6px 11px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 100px;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .country-chip:active { transform: scale(0.9); }

  .icon-btn {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.15s;
  }
  .icon-btn:active { transform: scale(0.88); }

  .hero {
    padding: 34px 20px 24px;
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 280px; height: 280px;
    background: radial-gradient(circle, rgba(255,60,60,0.09) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,60,60,0.09);
    border: 1px solid rgba(255,60,60,0.28);
    border-radius: 100px;
    padding: 4px 12px;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
  }

  .hero-tag::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: blink 1.5s infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.3; transform: scale(1.4); }
  }

  .hero h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(50px, 13vw, 72px);
    line-height: 0.88;
    letter-spacing: 2px;
  }

  .hero h1 span {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero-desc {
    margin-top: 12px;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.6;
    max-width: 265px;
  }

  .filters {
    padding: 0 18px 16px;
    display: flex;
    gap: 7px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .filters::-webkit-scrollbar { display: none; }

  .filter-btn {
    flex-shrink: 0;
    padding: 7px 15px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .filter-btn:active { transform: scale(0.93); }

  .section-header {
    padding: 0 18px 12px;
    display: flex;
    align-items: baseline;
    gap: 10px;
  }

  .section-header h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 2px;
  }

  .section-header span { font-size: 12px; color: var(--muted); }

  .products-grid {
    padding: 0 14px 40px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 11px;
  }

  .card {
    background: var(--card-bg);
    border-radius: 15px;
    border: 1px solid var(--border);
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.16s, border-color 0.16s;
    position: relative;
    animation: fadeInUp 0.45s ease both;
  }

  .card:active { transform: scale(0.97); }

  .card.wide {
    grid-column: span 2;
    display: flex;
    flex-direction: row;
  }

  .card-badge {
    position: absolute;
    top: 8px; left: 8px;
    padding: 3px 8px;
    border-radius: 100px;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    z-index: 2;
  }

  .badge-new  { background: var(--accent);  color: #fff; }
  .badge-hot  { background: var(--accent2); color: #fff; }
  .badge-sale { background: #00d4aa;        color: #000; }

  .card-img {
    width: 100%;
    aspect-ratio: 1 / 1;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  .card.wide .card-img {
    width: 46%;
    aspect-ratio: auto;
    min-height: 150px;
    flex-shrink: 0;
  }

  .card-img img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.35s ease;
  }

  .card:active .card-img img { transform: scale(1.05); }

  .card-emoji {
    font-size: 50px;
    animation: floatUp 3.2s ease-in-out infinite;
  }

  @keyframes floatUp {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-7px); }
  }

  .card-body { padding: 10px 12px 12px; }

  .card.wide .card-body {
    flex: 1;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .card-name {
    font-size: 13px;
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 3px;
  }

  .card-desc {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.5;
    margin-bottom: 7px;
  }

  .sizes-row {
    display: flex;
    gap: 3px;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }

  .size-chip {
    padding: 2px 6px;
    border-radius: 5px;
    background: var(--surface2);
    border: 1px solid var(--border);
    font-size: 9px;
    font-weight: 700;
    color: var(--muted);
  }

  .card-footer {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 6px;
  }

  .price-old {
    font-size: 10px;
    color: var(--muted);
    text-decoration: line-through;
    display: block;
    margin-bottom: 1px;
  }

  .price-now {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 0.5px;
    color: var(--accent);
    line-height: 1;
  }

  .buy-btn {
    background: linear-gradient(135deg, var(--accent), #ff6b3c);
    border: none;
    border-radius: 8px;
    padding: 7px 12px;
    color: #fff;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .buy-btn:active { transform: scale(0.9); opacity: 0.85; }

  /* МОДАЛКА */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 300;
    display: none;
    align-items: flex-end;
  }

  .modal-overlay.open {
    display: flex;
    animation: fadeIn 0.18s ease;
  }

  .modal-sheet {
    width: 100%;
    background: #161616;
    border-radius: 22px 22px 0 0;
    border: 1px solid #272727;
    border-bottom: none;
    padding: 18px 20px calc(26px + env(safe-area-inset-bottom));
    transform: translateY(100%);
    transition: transform 0.33s cubic-bezier(0.34, 1.4, 0.64, 1);
    max-height: 88vh;
    overflow-y: auto;
  }

  .modal-overlay.open .modal-sheet { transform: translateY(0); }

  .modal-drag {
    width: 34px; height: 4px;
    border-radius: 2px;
    background: #282828;
    margin: 0 auto 16px;
  }

  .modal-img {
    width: 100%;
    aspect-ratio: 4/3;
    border-radius: 14px;
    background: var(--surface2);
    overflow: hidden;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 76px;
  }

  .modal-img img {
    width: 100%; height: 100%;
    object-fit: cover;
  }

  .modal-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }

  .modal-desc {
    color: var(--muted);
    font-size: 13px;
    line-height: 1.6;
    margin-bottom: 12px;
  }

  .modal-price-row {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 16px;
  }

  .modal-price {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 34px;
    color: var(--accent);
    line-height: 1;
  }

  .modal-price-old {
    font-size: 14px;
    color: var(--muted);
    text-decoration: line-through;
  }

  .modal-size-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 9px;
  }

  .modal-sizes {
    display: flex;
    gap: 8px;
    margin-bottom: 18px;
  }

  .sz-btn {
    flex: 1;
    padding: 10px 0;
    border-radius: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.13s;
  }

  .sz-btn.on {
    background: var(--accent);
    border-color: var(--accent);
  }

  .modal-order-btn {
    width: 100%;
    padding: 15px;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    color: #fff;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 0.3px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: opacity 0.15s, transform 0.15s;
  }

  .modal-order-btn:active { opacity: 0.85; transform: scale(0.98); }

  /* АНИМАЦИИ */
  @keyframes fadeIn     { from { opacity: 0; }                          to { opacity: 1; } }
  @keyframes fadeInUp   { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeInDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div id="country-screen">
  <div class="country-glow"></div>
  <div class="cs-logo">DRIP STORE</div>
  <div class="cs-sub">Premium T-Shirts</div>
  <div class="cs-q">Из какой ты страны?</div>
  <div class="cs-hint">Выбери, чтобы видеть цены в своей валюте</div>
  <div class="cs-list">
    <button class="cs-btn" onclick="selectCountry('ua')">
      <span class="cs-flag">🇺🇦</span>
      <div class="cs-info">
        <div class="cs-country-name">Украина</div>
        <div class="cs-currency-hint">Цены в гривнах (₴)</div>
      </div>
      <span class="cs-arrow">›</span>
    </button>
    <button class="cs-btn" onclick="selectCountry('ru')">
      <span class="cs-flag">🇷🇺</span>
      <div class="cs-info">
        <div class="cs-country-name">Россия</div>
        <div class="cs-currency-hint">Цены в рублях (₽)</div>
      </div>
      <span class="cs-arrow">›</span>
    </button>
    <button class="cs-btn" onclick="selectCountry('de')">
      <span class="cs-flag">🇩🇪</span>
      <div class="cs-info">
        <div class="cs-country-name">Германия</div>
        <div class="cs-currency-hint">Цены в евро (€)</div>
      </div>
      <span class="cs-arrow">›</span>
    </button>
  </div>
</div>
<div id="app">

  <header>
    <div>
      <div class="logo">DRIP STORE</div>
      <div class="logo-sub">Premium T-Shirts</div>
    </div>
    <div class="header-right">
      <div class="country-chip" onclick="changeCountry()">
        <span id="hdr-flag">🇺🇦</span>
        <span id="hdr-sym">₴</span>
      </div>
      <div class="icon-btn" onclick="openContact()">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </div>
    </div>
  </header>

  <section class="hero">
    <div class="hero-tag">🔥 Новая коллекция 2025</div>
    <h1>НОСИ<br><span>СТИЛЬ</span><br>СМЕЛО</h1>
    <p class="hero-desc">Эксклюзивные футболки для тех, кто не боится выделяться. Каждый дроп — это история.</p>
  </section>

  <div class="filters">
    <button class="filter-btn active" onclick="filterProducts('all', this)">Все</button>
    <button class="filter-btn" onclick="filterProducts('street', this)">Стрит</button>
    <button class="filter-btn" onclick="filterProducts('minimal', this)">Минимал</button>
    <button class="filter-btn" onclick="filterProducts('graphic', this)">Графика</button>
    <button class="filter-btn" onclick="filterProducts('limited', this)">Limited</button>
  </div>

  <div class="section-header">
    <h2>Каталог</h2>
    <span id="product-count"></span>
  </div>

  <div class="products-grid" id="grid"></div>

</div>
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal-sheet">
    <div class="modal-drag"></div>
    <div class="modal-img" id="m-img"></div>
    <div class="modal-name" id="m-name"></div>
    <div class="modal-desc" id="m-desc"></div>
    <div class="modal-price-row">
      <div class="modal-price" id="m-price"></div>
      <div class="modal-price-old" id="m-price-old"></div>
    </div>
    <div class="modal-size-label">Выбери размер</div>
    <div class="modal-sizes" id="m-sizes"></div>
    <button class="modal-order-btn" id="m-order-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="white">
        <path d="M12 0C5.373 0 0 5.373 0 12c0 2.124.554 4.123 1.528 5.857L0 24l6.334-1.514A11.952 11.952 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0z"/>
      </svg>
      Заказать в Telegram
    </button>
  </div>
</div>

<script>

    photo:   '',

  },
  {

    emoji:   '🐉',
    photo:   '',
    badge:   '',
    wide:    false,
    category:'graphic',
    sizes:   ['M', 'L', 'XL'],
    prices: {

const COUNTRY_META = {
  ua: { flag: '🇺🇦', sym: '₴', name: 'Украина' },
  ru: { flag: '🇷🇺', sym: '₽', name: 'Россия'  },
  de: { flag: '🇩🇪', sym: '€', name: 'Германия' },
};

let country      = null;
let currentIdx   = null;
let selectedSize = null;
let currentList  = products;

function selectCountry(code) {
  country = code;
  try { localStorage.setItem('drip_country', code); } catch(e){}

  document.getElementById('hdr-flag').textContent = COUNTRY_META[code].flag;
  document.getElementById('hdr-sym').textContent  = COUNTRY_META[code].sym;

  const cs = document.getElementById('country-screen');
  cs.classList.add('hiding');
  setTimeout(() => cs.style.display = 'none', 360);

  const app = document.getElementById('app');
  app.classList.add('visible');

  renderGrid(currentList);
}

function changeCountry() {
  country = null;
  const cs = document.getElementById('country-screen');
  cs.style.display = '';
  cs.classList.remove('hiding');
  document.getElementById('app').classList.remove('visible');
}

function renderGrid(list) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  document.getElementById('product-count').textContent =
    `${list.length} ${list.length===1?'товар':list.length<5?'товара':'товаров'}`;

  list.forEach((p, i) => {
    const pr = p.prices[country];
    const card = document.createElement('div');
    card.className = 'card' + (p.wide ? ' wide' : '');
    card.setAttribute('data-category', p.category);
    card.style.animationDelay = (0.07 + i * 0.05) + 's';
    card.onclick = () => openModal(p.id);

    const badgeMap = { new: 'НОВИНКА', hot: '🔥 ХИТ', sale: 'СКИДКА' };
    const badgeHTML = p.badge
      ? `<span class="card-badge badge-${p.badge}">${badgeMap[p.badge]}</span>` : '';

    const imgInner = p.photo
      ? `<img src="${p.photo}" alt="${p.name}" loading="lazy">`
      : `<span class="card-emoji">${p.emoji}</span>`;

    const sizesHTML = p.sizes.map(s => `<div class="size-chip">${s}</div>`).join('');
    const oldHTML   = pr.old ? `<span class="price-old">${pr.old}${pr.sym}</span>` : '';

    card.innerHTML = `
      ${badgeHTML}
      <div class="card-img">${imgInner}</div>
      <div class="card-body">
        <div>
          <div class="card-name">${p.name}</div>
          <div class="card-desc">${p.desc}</div>
          <div class="sizes-row">${sizesHTML}</div>
        </div>
        <div class="card-footer">
          <div>${oldHTML}<div class="price-now">${pr.now}${pr.sym}</div></div>
          <button class="buy-btn" onclick="event.stopPropagation();openModal(${p.id})">Купить</button>
        </div>
      </div>`;
    grid.appendChild(card);
  });
}

function openModal(id) {
  const p = products.find(x => x.id === id);
  if (!p) return;
  currentIdx   = id;
  selectedSize = p.sizes[0];

  const pr = p.prices[country];

  const imgBox = document.getElementById('m-img');
  imgBox.innerHTML = p.photo
    ? `<img src="${p.photo}" alt="${p.name}">`
    : p.emoji;

  document.getElementById('m-name').textContent      = p.name;
  document.getElementById('m-desc').textContent      = p.desc;
  document.getElementById('m-price').textContent     = pr.now + pr.sym;
  document.getElementById('m-price-old').textContent = pr.old ? (pr.old + pr.sym) : '';

  const sizesEl = document.getElementById('m-sizes');
  sizesEl.innerHTML = '';
  p.sizes.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = 'sz-btn' + (i === 0 ? ' on' : '');
    btn.textContent = s;
    btn.onclick = () => {
      sizesEl.querySelectorAll('.sz-btn').forEach(b => b.classList.remove('on'));
      btn.classList.add('on');
      selectedSize = s;
    };
    sizesEl.appendChild(btn);
  });

  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e.target === document.getElementById('modal')) {
    document.getElementById('modal').classList.remove('open');
    document.body.style.overflow = '';
  }
}

document.getElementById('m-order-btn').onclick = () => {
  const p = products.find(x => x.id === currentIdx);
  if (!p) return;
  const pr  = p.prices[country];
  const msg = encodeURIComponent(
    `👕 Хочу заказать: ${p.name}\n📐 Размер: ${selectedSize}\n💰 Цена: ${pr.now}${pr.sym}\n🌍 Страна: ${COUNTRY_META[country].name}`
  );
  const url = `https://t.me/${OWNER_USERNAME}?text=${msg}`;
  if (window.Telegram?.WebApp) window.Telegram.WebApp.openTelegramLink(url);
  else window.open(url, '_blank');
};

function openContact() {
  const url = `https://t.me/${OWNER_USERNAME}`;
  if (window.Telegram?.WebApp) window.Telegram.WebApp.openTelegramLink(url);
  else window.open(url, '_blank');
}

function filterProducts(cat, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentList = cat === 'all' ? products : products.filter(p => p.category === cat);
  renderGrid(currentList);
}

(function init() {
  if (window.Telegram?.WebApp) {
    window.Telegram.WebApp.ready();
    window.Telegram.WebApp.expand();
  }
  let saved = null;
  try { saved = localStorage.getItem('drip_country'); } catch(e){}
  if (saved && COUNTRY_META[saved]) selectCountry(saved);
})();
</script>
