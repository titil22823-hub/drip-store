<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>666 STORE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;800&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

:root{
  --bg: #050507;
  --layer1: #0a0a0f;
  --layer2: #11111a;
  --layer3: #1a1a25;
  --border: #2a2a3a;
  --text: #f0f0ff;
  --text-dim: #8888aa;
  --accent1: #00f5ff;
  --accent2: #ff00aa;
  --accent3: #7b00ff;
  --glow1: 0 0 20px rgba(0,245,255,0.4);
  --glow2: 0 0 20px rgba(255,0,170,0.4);
  --radius: 2px;
  --transition: 0.15s cubic-bezier(0.4,0,0.2,1);
}

::selection{background:var(--accent2);color:#fff}

html,body{
  background:var(--bg);
  color:var(--text);
  font-family:'JetBrains Mono',monospace;
  min-height:100vh;
  overflow-x:hidden;
  position:relative;
}

body::before{
  content:'';
  position:fixed;inset:0;
  background:repeating-linear-gradient(
    0deg,
    transparent,
    transparent 1px,
    rgba(0,245,255,0.02) 1px,
    rgba(0,245,255,0.02) 2px
  );
  pointer-events:none;z-index:9999;
  animation:scanline 8s linear infinite;
}

@keyframes scanline{
  0%{background-position:0 0}
  100%{background-position:0 100vh}
}

@keyframes glitch{
  0%,90%,100%{transform:translate(0)}
  92%{transform:translate(-2px,1px)}
  94%{transform:translate(2px,-1px)}
  96%{transform:translate(-1px,2px)}
  98%{transform:translate(1px,-2px)}
}

@keyframes pulse-glow{
  0%,100%{box-shadow:var(--glow1)}
  50%{box-shadow:0 0 40px rgba(0,245,255,0.8)}
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-8px)}
}

/* COUNTRY SELECTOR */
#cs{
  position:fixed;inset:0;z-index:1000;
  background:var(--bg);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:32px 24px;
}
#cs.hidden{display:none}

.cs-brand{
  font-family:'Orbitron',sans-serif;
  font-size:42px;font-weight:900;
  letter-spacing:-2px;
  background:linear-gradient(135deg,var(--accent1),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  margin-bottom:8px;
  animation:glitch 3s infinite;
  text-shadow:0 0 30px rgba(0,245,255,0.3);
}

.cs-sub{
  font-size:11px;color:var(--text-dim);
  letter-spacing:4px;text-transform:uppercase;
  margin-bottom:48px;
}

.cs-label{
  font-size:10px;color:var(--accent1);
  letter-spacing:2px;text-transform:uppercase;
  margin-bottom:16px;
  display:flex;align-items:center;gap:8px;
}
.cs-label::before{
  content:'';width:20px;height:1px;
  background:linear-gradient(90deg,transparent,var(--accent1));
}

.cs-grid{
  display:grid;grid-template-columns:1fr;
  gap:12px;width:100%;max-width:360px;
}

.cs-opt{
  background:var(--layer2);
  border:1px solid var(--border);
  border-left:3px solid transparent;
  border-radius:var(--radius);
  padding:16px 18px;
  display:flex;align-items:center;gap:14px;
  cursor:pointer;
  transition:all var(--transition);
  position:relative;
  overflow:hidden;
}
.cs-opt::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(0,245,255,0.1),transparent);
  opacity:0;transition:opacity var(--transition);
}
.cs-opt:hover{
  border-left-color:var(--accent1);
  background:var(--layer3);
  transform:translateX(4px);
}
.cs-opt:hover::before{opacity:1}
.cs-opt:active{transform:scale(0.98)}

.cs-opt.stars{
  border-color:rgba(255,0,170,0.4);
  background:linear-gradient(135deg,rgba(255,0,170,0.08),var(--layer2));
}
.cs-opt.stars:hover{
  border-left-color:var(--accent2);
  box-shadow:var(--glow2);
}

.cs-flag{font-size:24px;flex-shrink:0;filter:saturate(1.2)}
.cs-data{flex:1}
.cs-title{
  font-size:13px;font-weight:600;
  letter-spacing:-0.3px;color:var(--text);
}
.cs-meta{
  font-size:10px;color:var(--text-dim);
  margin-top:2px;
}
.cs-arrow{
  color:var(--accent1);font-size:18px;
  font-weight:300;transition:transform var(--transition);
}
.cs-opt:hover .cs-arrow{transform:translateX(3px)}

/* APP CONTAINER */
#app{display:none}
#app.active{display:block;animation:fadeIn 0.3s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* HEADER */
header{
  position:sticky;top:0;z-index:200;
  height:56px;padding:0 16px;
  background:rgba(5,5,7,0.95);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}

.brand{
  font-family:'Orbitron',sans-serif;
  font-size:16px;font-weight:700;
  letter-spacing:-1px;
  background:linear-gradient(135deg,var(--text),var(--accent1));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}

.header-actions{display:flex;align-items:center;gap:10px}

.currency-chip{
  display:flex;align-items:center;gap:6px;
  padding:6px 12px;
  background:var(--layer2);
  border:1px solid var(--border);
  border-radius:100px;
  font-size:11px;font-weight:600;
  cursor:pointer;
  transition:all var(--transition);
}
.currency-chip:hover{
  border-color:var(--accent1);
  box-shadow:var(--glow1);
}
.currency-chip.stars{
  border-color:var(--accent2);
  color:var(--accent2);
}

.icon-btn{
  width:36px;height:36px;
  background:var(--layer2);
  border:1px solid var(--border);
  border-radius:var(--radius);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  transition:all var(--transition);
}
.icon-btn:hover{
  border-color:var(--accent1);
  transform:rotate(90deg);
}
.icon-btn svg{width:16px;height:16px;stroke:var(--text-dim)}

/* HERO */
.hero{
  padding:48px 16px 32px;
  border-bottom:1px solid var(--border);
  position:relative;
  overflow:hidden;
}
.hero::after{
  content:'666';
  position:absolute;right:-20px;top:-40px;
  font-family:'Orbitron',sans-serif;
  font-size:120px;font-weight:900;
  color:rgba(0,245,255,0.03);
  pointer-events:none;
  transform:rotate(15deg);
}

.hero-tag{
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 10px;
  background:rgba(123,0,255,0.15);
  border:1px solid var(--accent3);
  border-radius:var(--radius);
  font-size:9px;font-weight:600;
  letter-spacing:2px;text-transform:uppercase;
  color:var(--accent1);
  margin-bottom:20px;
}

.hero-title{
  font-family:'Orbitron',sans-serif;
  font-size:clamp(32px,8vw,48px);
  font-weight:900;letter-spacing:-2px;
  line-height:1;
  margin-bottom:12px;
}
.hero-title .highlight{
  background:linear-gradient(135deg,var(--accent2),var(--accent3));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}

.hero-desc{
  font-size:12px;color:var(--text-dim);
  line-height:1.8;max-width:280px;
}

/* FILTERS */
.filters{
  display:flex;gap:0;
  border-bottom:1px solid var(--border);
  padding:0 4px;
  overflow-x:auto;scrollbar-width:none;
}
.filters::-webkit-scrollbar{display:none}

.filter-btn{
  flex-shrink:0;
  padding:14px 18px;
  background:transparent;
  border:none;
  border-bottom:2px solid transparent;
  color:var(--text-dim);
  font-family:'JetBrains Mono',monospace;
  font-size:11px;font-weight:600;
  letter-spacing:1px;text-transform:uppercase;
  cursor:pointer;
  transition:all var(--transition);
  position:relative;
}
.filter-btn::after{
  content:'';position:absolute;bottom:-1px;left:50%;
  width:0;height:2px;
  background:var(--accent1);
  transition:all var(--transition);
  transform:translateX(-50%);
}
.filter-btn.active{
  color:var(--accent1);
}
.filter-btn.active::after{width:100%}
.filter-btn:active{opacity:0.7}

/* SECTION HEADER */
.section-head{
  padding:18px 16px 12px;
  display:flex;align-items:center;justify-content:space-between;
}
.section-title{
  font-size:10px;font-weight:700;
  letter-spacing:3px;text-transform:uppercase;
  color:var(--text-dim);
}
.section-count{
  font-size:10px;color:var(--accent1);
  background:rgba(0,245,255,0.1);
  padding:2px 8px;border-radius:100px;
}

/* PRODUCT GRID */
.grid{
  padding:0 12px 60px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

/* PRODUCT CARD */
.card{
  background:var(--layer1);
  border:1px solid var(--border);
  border-radius:var(--radius);
  cursor:pointer;
  overflow:hidden;
  position:relative;
  transition:all var(--transition);
  display:flex;flex-direction:column;
}
.card:hover{
  border-color:var(--accent1);
  box-shadow:var(--glow1);
  transform:translateY(-2px);
}
.card.wide{grid-column:span 2}

.card-badge{
  position:absolute;top:10px;left:10px;
  padding:3px 8px;
  font-size:9px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;
  border-radius:var(--radius);
  z-index:2;
}
.badge-new{background:var(--accent1);color:#000}
.badge-hot{background:var(--accent2);color:#fff}
.badge-sale{
  background:transparent;
  border:1px solid var(--accent1);
  color:var(--accent1);
}

.card-media{
  aspect-ratio:1;
  background:var(--layer2);
  display:flex;align-items:center;justify-content:center;
  position:relative;
  overflow:hidden;
}
.card.wide .card-media{
  aspect-ratio:16/9;
  min-height:140px;
}
.card-media::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,transparent,rgba(0,0,0,0.4));
  opacity:0;transition:opacity var(--transition);
}
.card:hover .card-media::after{opacity:1}

.card-media-content{
  font-size:48px;
  filter:grayscale(100%) contrast(1.2);
  transition:all var(--transition);
}
.card:hover .card-media-content{
  filter:grayscale(0%) contrast(1);
  transform:scale(1.05);
}
.card-media img{
  width:100%;height:100%;
  object-fit:cover;
  filter:grayscale(100%);
  transition:filter var(--transition);
}
.card:hover .card-media img{filter:grayscale(0%)}

.card-body{
  padding:14px;
  display:flex;flex-direction:column;
  flex:1;
}
.card.wide .card-body{
  display:grid;
  grid-template-columns:1fr auto;
  gap:12px;align-items:center;
}

.card-category{
  font-size:9px;font-weight:600;
  letter-spacing:2px;text-transform:uppercase;
  color:var(--accent3);
  margin-bottom:6px;
}

.card-name{
  font-size:14px;font-weight:700;
  letter-spacing:-0.5px;
  margin-bottom:4px;
  color:var(--text);
}
.card.wide .card-name{font-size:16px}

.card-desc{
  font-size:10px;color:var(--text-dim);
  line-height:1.6;
  margin-bottom:12px;
}
.card.wide .card-desc{margin-bottom:0}

.card-footer{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:auto;
}

.price-group{display:flex;flex-direction:column;gap:2px}
.price-old{
  font-size:9px;color:var(--text-dim);
  text-decoration:line-through;
}
.price-current{
  font-size:16px;font-weight:800;
  letter-spacing:-0.5px;
  color:var(--text);
}
.price-stars{
  display:flex;align-items:center;gap:4px;
  font-size:16px;font-weight:800;
  color:var(--accent2);
}
.price-stars .star-icon{font-size:12px}

.btn-buy{
  padding:8px 14px;
  background:transparent;
  border:1px solid var(--border);
  border-radius:var(--radius);
  color:var(--text);
  font-family:'JetBrains Mono',monospace;
  font-size:10px;font-weight:600;
  letter-spacing:1px;text-transform:uppercase;
  cursor:pointer;
  transition:all var(--transition);
}
.btn-buy:hover{
  background:var(--accent1);
  border-color:var(--accent1);
  color:#000;
  box-shadow:var(--glow1);
}

/* MODAL */
.modal{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.85);
  z-index:500;
  display:none;
  align-items:flex-end;
  justify-content:center;
}
.modal.active{display:flex;animation:fadeIn 0.2s ease}

.modal-sheet{
  width:100%;max-width:480px;
  background:var(--layer1);
  border-top:1px solid var(--border);
  border-radius:16px 16px 0 0;
  padding:20px 16px calc(24px + env(safe-area-inset-bottom));
  transform:translateY(100%);
  transition:transform 0.3s cubic-bezier(0.2,0.8,0.2,1);
  max-height:92vh;
  overflow-y:auto;
}
.modal.active .modal-sheet{transform:translateY(0)}

.modal-handle{
  width:40px;height:4px;
  background:var(--border);
  border-radius:2px;
  margin:0 auto 20px;
}

.modal-media{
  width:100%;aspect-ratio:4/3;
  background:var(--layer2);
  border-radius:var(--radius);
  margin-bottom:16px;
  display:flex;align-items:center;justify-content:center;
  position:relative;
  overflow:hidden;
  border:1px solid var(--border);
}
.modal-media::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(
    45deg,
    transparent,
    transparent 10px,
    rgba(0,245,255,0.03) 10px,
    rgba(0,245,255,0.03) 20px
  );
}
.modal-media-content{
  font-size:64px;
  filter:grayscale(100%);
  transition:filter 0.3s;
}
.modal-media:hover .modal-media-content{filter:grayscale(0%)}
.modal-media img{
  width:100%;height:100%;
  object-fit:cover;
  filter:grayscale(100%);
}

.modal-tag{
  position:absolute;top:12px;right:12px;
  padding:4px 10px;
  background:rgba(0,0,0,0.7);
  border:1px solid var(--accent1);
  border-radius:var(--radius);
  font-size:9px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;
  color:var(--accent1);
}

.modal-category{
  font-size:10px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;
  color:var(--accent3);
  margin-bottom:8px;
}

.modal-name{
  font-family:'Orbitron',sans-serif;
  font-size:22px;font-weight:700;
  letter-spacing:-1px;
  margin-bottom:10px;
  color:var(--text);
}

.modal-desc{
  font-size:12px;color:var(--text-dim);
  line-height:1.7;
  margin-bottom:20px;
}

.modal-divider{
  height:1px;
  background:linear-gradient(90deg,transparent,var(--border),transparent);
  margin-bottom:20px;
}

.modal-pricing{
  display:flex;align-items:center;gap:16px;
  flex-wrap:wrap;
  margin-bottom:20px;
}

.modal-price-main{
  font-family:'Orbitron',sans-serif;
  font-size:26px;font-weight:700;
  letter-spacing:-1px;
  color:var(--text);
}

.modal-price-alt{
  display:flex;align-items:center;gap:6px;
  padding:6px 12px;
  background:rgba(255,0,170,0.1);
  border:1px solid var(--accent2);
  border-radius:var(--radius);
  font-size:13px;font-weight:700;
  color:var(--accent2);
}

.modal-note{
  font-size:11px;color:var(--text-dim);
  line-height:1.6;
  padding:12px;
  background:var(--layer2);
  border-left:2px solid var(--accent1);
  border-radius:0 var(--radius) var(--radius) 0;
  margin-bottom:20px;
}

.modal-action{
  width:100%;
  padding:16px;
  background:linear-gradient(135deg,var(--accent1),var(--accent3));
  border:none;
  border-radius:var(--radius);
  color:#000;
  font-family:'JetBrains Mono',monospace;
  font-size:13px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;
  transition:all var(--transition);
}
.modal-action:hover{
  box-shadow:0 0 30px rgba(0,245,255,0.6);
  transform:translateY(-2px);
}
.modal-action:active{transform:scale(0.98)}

/* CARD ANIMATION DELAYS */
.card:nth-child(1){animation-delay:0.05s}
.card:nth-child(2){animation-delay:0.1s}
.card:nth-child(3){animation-delay:0.15s}
.card:nth-child(4){animation-delay:0.2s}
.card:nth-child(5){animation-delay:0.25s}
.card:nth-child(6){animation-delay:0.3s}
.card:nth-child(7){animation-delay:0.35s}
.card:nth-child(8){animation-delay:0.4s}
.card:nth-child(9){animation-delay:0.45s}

@keyframes cardEnter{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}
.card{animation:cardEnter 0.4s ease both}

/* RESPONSIVE */
@media(min-width:480px){
  .grid{grid-template-columns:repeat(3,1fr)}
  .card.wide{grid-column:span 3}
}

@media(max-width:360px){
  .cs-brand{font-size:36px}
  .hero-title{font-size:28px}
}
</style>
</head>
<body>

<div id="cs">
  <div class="cs-brand">666 STORE</div>
  <div class="cs-sub">SYSTEM // INIT</div>
  <div class="cs-label">SELECT REGION</div>
  <div class="cs-grid">
    <button class="cs-opt" onclick="selectRegion('ua')">
      <span class="cs-flag">🇺🇦</span>
      <div class="cs-data">
        <div class="cs-title">UKRAINE</div>
        <div class="cs-meta">UAH · ₴</div>
      </div>
      <span class="cs-arrow">→</span>
    </button>
    <button class="cs-opt" onclick="selectRegion('eu')">
      <span class="cs-flag">🇪🇺</span>
      <div class="cs-data">
        <div class="cs-title">EUROPE</div>
        <div class="cs-meta">EUR · €</div>
      </div>
      <span class="cs-arrow">→</span>
    </button>
    <button class="cs-opt stars" onclick="selectRegion('stars')">
      <span class="cs-flag">⭐</span>
      <div class="cs-data">
        <div class="cs-title">TELEGRAM STARS</div>
        <div class="cs-meta">DIGITAL · ⭐</div>
      </div>
      <span class="cs-arrow">→</span>
    </button>
  </div>
</div>

<div id="app">
  <header>
    <div class="brand">666//STORE</div>
    <div class="header-actions">
      <div class="currency-chip" id="currencyChip" onclick="reopenRegion()">
        <span id="chipFlag">🇺🇦</span>
        <span id="chipSym">₴</span>
      </div>
      <button class="icon-btn" onclick="openSupport()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </button>
    </div>
  </header>

  <section class="hero">
    <div class="hero-tag">◆ DROP_2025</div>
    <h1 class="hero-title">WEAR THE <span class="highlight">VOID</span></h1>
    <p class="hero-desc">Limited streetwear. No restocks. Digital-first drops for the underground.</p>
  </section>

  <nav class="filters">
    <button class="filter-btn active" onclick="applyFilter('all',this)">ALL</button>
    <button class="filter-btn" onclick="applyFilter('hoodie',this)">HOODIES</button>
    <button class="filter-btn" onclick="applyFilter('tee',this)">TEES</button>
    <button class="filter-btn" onclick="applyFilter('limited',this)">LIMITED</button>
  </nav>

  <div class="section-head">
    <div class="section-title">CATALOG</div>
    <div class="section-count" id="itemCount">0 ITEMS</div>
  </div>

  <div class="grid" id="productGrid"></div>
</div>

<div class="modal" id="productModal" onclick="handleModalClose(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-media" id="modalMedia">
      <div class="modal-tag">666//STORE</div>
    </div>
    <div class="modal-category" id="modalCat"></div>
    <h2 class="modal-name" id="modalName"></h2>
    <p class="modal-desc" id="modalDesc"></p>
    <div class="modal-divider"></div>
    <div class="modal-pricing" id="modalPricing"></div>
    <div class="modal-note">Size is discussed directly with seller — message to confirm fit</div>
    <button class="modal-action" id="modalAction">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 0C5.373 0 0 5.373 0 12c0 2.124.554 4.123 1.528 5.857L0 24l6.334-1.514A11.952 11.952 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0z"/>
      </svg>
      CONTACT SELLER
    </button>
  </div>
</div>

<script>
const SELLER_HANDLE = 'YOUR_USERNAME';

const CATALOG = [
  {
    id:0, name:'VOID_001', cat:'TEE · LIMITED', type:'limited',
    desc:'Drop #001. 50 units only. 320gsm heavyweight cotton, screen-print graphics, reinforced seams. Oversized silhouette.',
    symbol:'◈', image:'', badge:'hot', wide:true,
    pricing:{
      ua:   {current:'1890',original:'2500',symbol:'₴'},
      eu:   {current:'49',original:'65',symbol:'€'},
      stars:{current:'250',original:'320',symbol:'⭐'},
    }
  },
  {
    id:1, name:'NIGHT_WALKER', cat:'HOODIE', type:'hoodie',
    desc:'320gsm fleece interior. Oversized fit. Kangaroo pocket, reinforced cuffs. Matte black finish.',
    symbol:'☾', image:'', badge:'new', wide:false,
    pricing:{
      ua:   {current:'2400',original:'',symbol:'₴'},
      eu:   {current:'59',original:'',symbol:'€'},
      stars:{current:'320',original:'',symbol:'⭐'},
    }
  },
  {
    id:2, name:'DRAGON_FLUX', cat:'TEE', type:'tee',
    desc:'Embroidery detail + full back print. 240gsm cotton. Intricate artwork, premium finish.',
    symbol:'🐉', image:'', badge:'', wide:false,
    pricing:{
      ua:   {current:'1400',original:'',symbol:'₴'},
      eu:   {current:'34',original:'',symbol:'€'},
      stars:{current:'180',original:'',symbol:'⭐'},
    }
  },
  {
    id:3, name:'VOLT_MINIMAL', cat:'TEE', type:'tee',
    desc:'Clean graphic print. Oversized cut. 200gsm cotton. Minimalist aesthetic.',
    symbol:'⚡', image:'', badge:'sale', wide:false,
    pricing:{
      ua:   {current:'980',original:'1400',symbol:'₴'},
      eu:   {current:'24',original:'34',symbol:'€'},
      stars:{current:'120',original:'175',symbol:'⭐'},
    }
  },
  {
    id:4, name:'SHADOW_FORM', cat:'HOODIE', type:'hoodie',
    desc:'Double-knit construction. Voluminous hood, extended sleeves. 280gsm weight.',
    symbol:'◐', image:'', badge:'', wide:false,
    pricing:{
      ua:   {current:'2200',original:'',symbol:'₴'},
      eu:   {current:'54',original:'',symbol:'€'},
      stars:{current:'290',original:'',symbol:'⭐'},
    }
  },
  {
    id:5, name:'PIXEL_GHOST', cat:'TEE', type:'tee',
    desc:'Retro pixel-art print. Oversized fit. 200gsm cotton. Nostalgic vibes.',
    symbol:'👾', image:'', badge:'', wide:false,
    pricing:{
      ua:   {current:'1150',original:'',symbol:'₴'},
      eu:   {current:'28',original:'',symbol:'€'},
      stars:{current:'145',original:'',symbol:'⭐'},
    }
  },
  {
    id:6, name:'INFERNO_BACK', cat:'HOODIE · LIMITED', type:'limited',
    desc:'Full-back flame graphic. 300gsm fleece. Oversized. Limited production run.',
    symbol:'🔥', image:'', badge:'new', wide:false,
    pricing:{
      ua:   {current:'2600',original:'',symbol:'₴'},
      eu:   {current:'64',original:'',symbol:'€'},
      stars:{current:'340',original:'',symbol:'⭐'},
    }
  },
  {
    id:7, name:'TIDE_SOFT', cat:'TEE', type:'tee',
    desc:'Soft-touch 180gsm cotton. Relaxed fit. Subtle branding.',
    symbol:'🌊', image:'', badge:'', wide:false,
    pricing:{
      ua:   {current:'1100',original:'',symbol:'₴'},
      eu:   {current:'26',original:'',symbol:'€'},
      stars:{current:'135',original:'',symbol:'⭐'},
    }
  },
  {
    id:8, name:'PURE_BLACK', cat:'HOODIE', type:'hoodie',
    desc:'Zero graphics. Pure form. 320gsm fleece. For those who know.',
    symbol:'◼', image:'', badge:'', wide:false,
    pricing:{
      ua:   {current:'2100',original:'',symbol:'₴'},
      eu:   {current:'52',original:'',symbol:'€'},
      stars:{current:'275',original:'',symbol:'⭐'},
    }
  },
];

const REGIONS = {
  ua:   {flag:'🇺🇦',symbol:'₴',isStars:false},
  eu:   {flag:'🇪🇺',symbol:'€',isStars:false},
  stars:{flag:'⭐', symbol:'⭐',isStars:true},
};

let activeRegion = null;
let activeProduct = null;
let filteredList = CATALOG;

function selectRegion(region){
  activeRegion = region;
  try{localStorage.setItem('_666_region', region)}catch(e){}
  
  document.getElementById('chipFlag').textContent = REGIONS[region].flag;
  document.getElementById('chipSym').textContent = REGIONS[region].symbol;
  
  const chip = document.getElementById('currencyChip');
  REGIONS[region].isStars 
    ? chip.classList.add('stars') 
    : chip.classList.remove('stars');
  
  const selector = document.getElementById('cs');
  selector.style.opacity = '0';
  selector.style.pointerEvents = 'none';
  setTimeout(()=>{selector.style.display='none'}, 250);
  
  document.getElementById('app').classList.add('active');
  renderProducts(filteredList);
}

function reopenRegion(){
  activeRegion = null;
  const selector = document.getElementById('cs');
  selector.style.display = '';
  setTimeout(()=>{
    selector.style.opacity = '1';
    selector.style.pointerEvents = 'auto';
  }, 10);
  document.getElementById('app').classList.remove('active');
}

function renderProducts(list){
  const grid = document.getElementById('productGrid');
  grid.innerHTML = '';
  
  const count = list.length;
  document.getElementById('itemCount').textContent = 
    `${count} ${count===1?'ITEM':count<5?'ITEMS':'ITEMS'}`;
  
  list.forEach((item, index)=>{
    const price = item.pricing[activeRegion];
    const isStars = REGIONS[activeRegion].isStars;
    
    const card = document.createElement('div');
    card.className = `card${item.wide?' wide':''}`;
    card.style.animationDelay = `${0.05 + index * 0.05}s`;
    card.onclick = () => openModal(item.id);
    
    const badgeMap = {new:'NEW', hot:'HOT', sale:'SALE'};
    const badgeHTML = item.badge 
      ? `<span class="card-badge badge-${item.badge}">${badgeMap[item.badge]}</span>` 
      : '';
    
    const mediaHTML = item.image
      ? `<img src="${item.image}" alt="${item.name}" loading="lazy">`
      : `<span class="card-media-content">${item.symbol}</span>`;
    
    const originalPriceHTML = price.original 
      ? `<span class="price-old">${price.original}${price.symbol}</span>` 
      : '';
    
    const priceHTML = isStars
      ? `<div class="price-stars"><span class="star-icon">⭐</span>${price.current}</div>`
      : `<div class="price-current">${originalPriceHTML}${price.current}${price.symbol}</div>`;
    
    card.innerHTML = `
      ${badgeHTML}
      <div class="card-media">${mediaHTML}</div>
      <div class="card-body">
        <div class="card-category">${item.cat}</div>
        <div class="card-name">${item.name}</div>
        <div class="card-desc">${item.desc}</div>
        <div class="card-footer">
          <div class="price-group">${priceHTML}</div>
          <button class="btn-buy" onclick="event.stopPropagation();openModal(${item.id})">VIEW</button>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
}

function openModal(id){
  const item = CATALOG.find(p => p.id === id);
  if(!item) return;
  
  activeProduct = id;
  const price = item.pricing[activeRegion];
  const isStars = REGIONS[activeRegion].isStars;
  const starsPrice = item.pricing.stars;
  
  const media = document.getElementById('modalMedia');
  media.innerHTML = item.image
    ? `<img src="${item.image}" alt="${item.name}"><div class="modal-tag">666//STORE</div>`
    : `<span class="modal-media-content">${item.symbol}</span><div class="modal-tag">666//STORE</div>`;
  
  document.getElementById('modalCat').textContent = item.cat;
  document.getElementById('modalName').textContent = item.name;
  document.getElementById('modalDesc').textContent = item.desc;
  
  const pricing = document.getElementById('modalPricing');
  const originalHTML = price.original 
    ? `<span style="color:var(--text-dim);text-decoration:line-through;font-size:14px">${price.original}${price.symbol}</span>` 
    : '';
  
  if(isStars){
    pricing.innerHTML = `
      <div style="display:flex;align-items:center;gap:8px">
        ${originalHTML}
        <div class="modal-price-main" style="color:var(--accent2)">⭐ ${price.current}</div>
      </div>
    `;
  } else {
    pricing.innerHTML = `
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <div>${originalHTML}<div class="modal-price-main">${price.current}${price.symbol}</div></div>
        <div class="modal-price-alt">⭐ ${starsPrice.current}</div>
      </div>
    `;
  }
  
  document.getElementById('productModal').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function handleModalClose(e){
  if(e.target === document.getElementById('productModal')){
    document.getElementById('productModal').classList.remove('active');
    document.body.style.overflow = '';
  }
}

document.getElementById('modalAction').onclick = () => {
  const item = CATALOG.find(p => p.id === activeProduct);
  if(!item) return;
  
  const price = item.pricing[activeRegion];
  const isStars = REGIONS[activeRegion].isStars;
  const priceDisplay = isStars 
    ? `⭐ ${price.current} STARS` 
    : `${price.current}${price.symbol}`;
  
  const message = encodeURIComponent(`ORDER REQUEST\n\nItem: ${item.name}\nPrice: ${priceDisplay}\n\nPlease confirm availability and size options.`);
  const link = `https://t.me/${SELLER_HANDLE}?text=${message}`;
  
  if(window.Telegram?.WebApp){
    window.Telegram.WebApp.openTelegramLink(link);
  } else {
    window.open(link, '_blank');
  }
};

function openSupport(){
  const link = `https://t.me/${SELLER_HANDLE}`;
  if(window.Telegram?.WebApp){
    window.Telegram.WebApp.openTelegramLink(link);
  } else {
    window.open(link, '_blank');
  }
}

function applyFilter(category, button){
  document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
  button.classList.add('active');
  
  filteredList = category === 'all' 
    ? CATALOG 
    : CATALOG.filter(p => p.type === category);
  
  renderProducts(filteredList);
}

(function init(){
  if(window.Telegram?.WebApp){
    window.Telegram.WebApp.ready();
    window.Telegram.WebApp.expand();
  }
  
  let saved = null;
  try{saved = localStorage.getItem('_666_region')}catch(e){}
  
  if(saved && REGIONS[saved]){
    selectRegion(saved);
  }
})();
</script>
</body>
</html>
